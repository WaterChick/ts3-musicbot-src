<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TS3 Music Bot</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f0f0f;
    --surface:  #1a1a1a;
    --surface2: #242424;
    --border:   #2a2a2a;
    --accent:   #7c5cbf;
    --accent-h: #9b7de0;
    --text:     #e4e4e4;
    --muted:    #777;
    --danger:   #c0392b;
    --green:    #27ae60;
    --radius:   8px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 14px 0;
  }
  .logo { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .logo span { color: var(--accent); }
  .status-pill {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .status-pill.playing  { color: var(--green);  border-color: var(--green);  background: #1a2e1e; }
  .status-pill.paused   { color: #e6a817;        border-color: #e6a817;       background: #2a2210; }
  .status-pill.stopped  { color: var(--muted);   border-color: var(--border); background: var(--surface2); }

  /* ── now-playing bar ── */
  .now-playing {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }
  .now-playing-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 12px 0;
    flex-wrap: wrap;
  }
  .np-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; }
  .np-track { flex: 1; min-width: 0; }
  .np-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .np-artists { color: var(--muted); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .np-empty { color: var(--muted); font-style: italic; }
  .controls { display: flex; gap: 8px; flex-shrink: 0; }
  .btn {
    padding: 6px 14px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent-h); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accent-h); border-color: var(--accent-h); }
  .btn.danger:hover { border-color: var(--danger); color: var(--danger); }

  /* ── main layout ── */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px;
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 24px;
    align-items: start;
  }

  /* ── section card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .card-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-header .count {
    font-size: 11px;
    font-weight: 400;
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* ── add URL form ── */
  .add-form { padding: 14px 16px; display: flex; gap: 8px; }
  .add-form input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius);
    padding: 8px 12px;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .add-form input::placeholder { color: var(--muted); }
  .add-form input:focus { border-color: var(--accent); }

  /* ── queue grid ── */
  .queue-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    padding: 12px;
    max-height: 520px;
    overflow-y: auto;
  }
  .queue-grid::-webkit-scrollbar { width: 6px; }
  .queue-grid::-webkit-scrollbar-track { background: transparent; }
  .queue-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .queue-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    cursor: grab;
    position: relative;
    user-select: none;
    transition: border-color 0.15s, opacity 0.15s, background 0.15s;
    min-width: 0;
  }
  .queue-card:active { cursor: grabbing; }
  .queue-card:hover { border-color: #3a3a3a; background: #202020; }
  .queue-card.dragging { opacity: 0.35; }
  .queue-card.drag-over { border-color: var(--accent); background: rgba(124,92,191,0.1); }

  .card-num { color: var(--muted); font-size: 11px; margin-bottom: 3px; }
  .card-title { font-weight: 500; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 40px; }
  .card-artist { color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

  .card-actions {
    position: absolute;
    top: 6px; right: 6px;
    display: flex;
    gap: 2px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .queue-card:hover .card-actions { opacity: 1; }

  .card-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 5px;
    border-radius: 4px;
    transition: all 0.15s;
    line-height: 1;
  }
  .card-btn.remove:hover { color: var(--danger); background: rgba(192,57,43,0.12); }
  .card-btn.top:hover { color: var(--accent-h); background: rgba(124,92,191,0.15); }

  .empty-state {
    padding: 32px 16px;
    text-align: center;
    color: var(--muted);
    font-style: italic;
  }

  /* ── local files ── */
  .local-list { max-height: 600px; overflow-y: auto; }
  .local-list::-webkit-scrollbar { width: 6px; }
  .local-list::-webkit-scrollbar-track { background: transparent; }
  .local-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .file-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .file-item:last-child { border-bottom: none; }
  .file-item:hover { background: var(--surface2); }
  .file-num { color: var(--muted); font-size: 11px; width: 22px; flex-shrink: 0; text-align: right; }
  .file-name { flex: 1; min-width: 0; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-add {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 4px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .file-add:hover { border-color: var(--accent); color: var(--accent-h); }

  /* ── volume ── */
  .vol-control { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .vol-icon { color: var(--muted); font-size: 14px; }
  .vol-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 90px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
  }
  .vol-slider::-moz-range-thumb {
    width: 14px;
    height: 14px;
    background: var(--accent);
    border-radius: 50%;
    border: none;
    cursor: pointer;
  }
  .vol-val { color: var(--muted); font-size: 12px; width: 28px; text-align: right; }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 16px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.ok   { border-color: var(--green); color: var(--green); }
  .toast.err  { border-color: var(--danger); color: var(--danger); }

  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">TS3 <span>Music Bot</span></div>
    <div class="status-pill stopped" id="statusPill">Stopped</div>
  </div>
</header>

<div class="now-playing">
  <div class="now-playing-inner">
    <div class="np-label">Now Playing</div>
    <div class="np-track">
      <div class="np-empty" id="npEmpty">Nothing playing</div>
      <div class="np-title" id="npTitle" style="display:none"></div>
      <div class="np-artists" id="npArtists" style="display:none"></div>
    </div>
    <div class="controls">
      <button class="btn" onclick="ctrl('play')">▶ Play</button>
      <button class="btn" onclick="ctrl('pause')">⏸ Pause</button>
      <button class="btn" onclick="ctrl('resume')">⏯ Resume</button>
      <button class="btn" onclick="ctrl('skip')">⏭ Skip</button>
      <button class="btn danger" onclick="ctrl('stop')">⏹ Stop</button>
    </div>
    <div class="vol-control">
      <span class="vol-icon">🔊</span>
      <input type="range" id="volSlider" class="vol-slider" min="0" max="100" value="100"
             oninput="onVolInput(this.value)">
      <span class="vol-val" id="volVal">100</span>
    </div>
  </div>
</div>

<div class="main">
  <!-- Left column -->
  <div style="display:flex;flex-direction:column;gap:16px;">

    <div class="card">
      <div class="card-header">Add to Queue</div>
      <div class="add-form">
        <input type="text" id="urlInput" placeholder="YouTube / Spotify / SoundCloud link or search…" onkeydown="if(event.key==='Enter')addUrl()">
        <button class="btn primary" onclick="addUrl()">+ Add</button>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        Queue
        <div style="display:flex;align-items:center;gap:8px;">
          <button class="btn" onclick="ctrl('shuffle')" style="padding:3px 10px;font-size:12px;" title="Shuffle queue">⇌ Shuffle</button>
          <button class="btn danger" onclick="confirmClear()" style="padding:3px 10px;font-size:12px;" title="Clear queue">✕ Clear</button>
          <span class="count" id="queueCount">0</span>
        </div>
      </div>
      <div class="queue-grid" id="queueList">
        <div class="empty-state" style="grid-column:1/-1">Queue is empty</div>
      </div>
    </div>

  </div>

  <!-- Right column -->
  <div class="card">
    <div class="card-header">
      Local Files
      <span class="count" id="localCount">0</span>
    </div>
    <div class="local-list" id="localList">
      <div class="empty-state">No local files found</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  let refreshTimer = null;
  let isDraggingVol = false;
  let volTimer = null;
  let lastQueueSize = 0;
  let addPending = null; // { sizeAtAdd, startTime }

  async function refresh() {
    try {
      const [qRes, vRes] = await Promise.all([fetch('/api/queue'), fetch('/api/volume')]);
      if (qRes.ok && !isDragging) renderState(await qRes.json());
      if (vRes.ok && !isDraggingVol) {
        const { volume } = await vRes.json();
        document.getElementById('volSlider').value = volume;
        document.getElementById('volVal').textContent = volume;
      }
    } catch (e) { /* ignore */ }
  }

  function renderState(data) {
    // status pill
    const pill = document.getElementById('statusPill');
    const state = data.state || 'stopped';
    pill.className = 'status-pill ' + state;
    pill.textContent = state.charAt(0).toUpperCase() + state.slice(1);

    // now playing
    const np = data.nowPlaying;
    const isEmpty = !np || np.empty || (!np.title && !np.artists);
    document.getElementById('npEmpty').style.display = isEmpty ? '' : 'none';
    document.getElementById('npTitle').style.display = isEmpty ? 'none' : '';
    document.getElementById('npArtists').style.display = isEmpty ? 'none' : '';
    if (!isEmpty) {
      document.getElementById('npTitle').textContent = np.title || np.link || '';
      document.getElementById('npArtists').textContent = np.artists || '';
    }

    // queue
    const queue = data.queue || [];
    document.getElementById('queueCount').textContent = queue.length;

    // error detection for add operations
    if (addPending !== null) {
      if (queue.length > addPending.sizeAtAdd) {
        toast('Added to queue', 'ok');
        addPending = null;
      } else if (Date.now() - addPending.startTime > 30000) {
        toast('Nothing added — link may be inaccessible or private', 'err');
        addPending = null;
      }
    }
    lastQueueSize = queue.length;

    const list = document.getElementById('queueList');
    if (queue.length === 0) {
      list.innerHTML = '<div class="empty-state" style="grid-column:1/-1">Queue is empty</div>';
    } else {
      list.innerHTML = queue.map((t, i) => `
        <div class="queue-card"
             draggable="true"
             ondragstart="onDragStart(event,${i})"
             ondragend="onDragEnd(event)"
             ondragover="onDragOver(event,${i})"
             ondrop="onDrop(event,${i})">
          <div class="card-actions">
            ${i > 0 ? `<button class="card-btn top" onclick="moveToTop(${i})" title="Move to top">⬆</button>` : ''}
            <button class="card-btn remove" onclick="removeTrack(${i})" title="Remove">×</button>
          </div>
          <div class="card-num">${i + 1}</div>
          <div class="card-title">${esc(t.title || t.link)}</div>
          ${t.artists ? `<div class="card-artist">${esc(t.artists)}</div>` : ''}
        </div>
      `).join('');
    }
  }

  async function loadLocalFiles() {
    try {
      const res = await fetch('/api/local-files');
      if (!res.ok) return;
      const data = await res.json();
      const files = data.files || [];
      document.getElementById('localCount').textContent = files.length;
      const list = document.getElementById('localList');
      if (files.length === 0) {
        list.innerHTML = '<div class="empty-state">No local files found</div>';
      } else {
        list.innerHTML = files.map(f => `
          <div class="file-item">
            <span class="file-num">${f.index}</span>
            <span class="file-name" title="${esc(f.name)}">${esc(f.name)}</span>
            <button class="file-add" onclick="addLocal(${f.index})">+ Add</button>
          </div>
        `).join('');
      }
    } catch (e) { /* ignore */ }
  }

  async function errorMsg(res, fallback) {
    try {
      const body = await res.json();
      if (body && body.error) return body.error;
    } catch (_) { /* body may be empty or not JSON */ }
    return fallback || ('HTTP ' + res.status);
  }

  async function addUrl() {
    const input = document.getElementById('urlInput');
    const url = input.value.trim();
    if (!url) { toast('Enter a link first', 'err'); return; }
    try {
      const res = await fetch('/api/queue/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      if (res.ok) {
        input.value = '';
        toast('Fetching…', '');
        addPending = { sizeAtAdd: lastQueueSize, startTime: Date.now() };
        refresh();
      } else {
        toast(await errorMsg(res, 'Failed to add'), 'err');
      }
    } catch (e) { toast('Network error', 'err'); }
  }

  async function addLocal(index) {
    try {
      const res = await fetch('/api/queue/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ local: index })
      });
      if (res.ok) {
        toast('Fetching…', '');
        addPending = { sizeAtAdd: lastQueueSize, startTime: Date.now() };
        refresh();
      } else {
        toast(await errorMsg(res, 'Failed to add'), 'err');
      }
    } catch (e) { toast('Network error', 'err'); }
  }

  function confirmClear() {
    if (!confirm('Clear the entire queue?')) return;
    ctrl('clear');
  }

  // ── drag and drop ──────────────────────────────────────────────────
  let dragSrcIdx = null;
  let isDragging = false;

  function onDragStart(e, index) {
    dragSrcIdx = index;
    isDragging = true;
    e.currentTarget.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  }

  function onDragEnd(e) {
    isDragging = false;
    dragSrcIdx = null;
    document.querySelectorAll('.queue-card').forEach(c => c.classList.remove('dragging', 'drag-over'));
  }

  function onDragOver(e, index) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('.queue-card').forEach(c => c.classList.remove('drag-over'));
    if (index !== dragSrcIdx) e.currentTarget.classList.add('drag-over');
  }

  async function onDrop(e, toIndex) {
    e.preventDefault();
    const from = dragSrcIdx;
    isDragging = false;
    dragSrcIdx = null;
    document.querySelectorAll('.queue-card').forEach(c => c.classList.remove('dragging', 'drag-over'));
    if (from === null || from === toIndex) return;
    try {
      const res = await fetch('/api/queue/reorder', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ from, to: toIndex })
      });
      if (!res.ok) toast(await errorMsg(res, 'Failed to reorder'), 'err');
      refresh();
    } catch (e) { toast('Network error', 'err'); }
  }

  async function moveToTop(index) {
    try {
      const res = await fetch('/api/queue/move-top/' + index, { method: 'POST' });
      if (res.ok) { refresh(); }
      else toast(await errorMsg(res, 'Failed to move'), 'err');
    } catch (e) { toast('Network error', 'err'); }
  }

  function onVolInput(v) {
    document.getElementById('volVal').textContent = v;
    isDraggingVol = true;
    clearTimeout(volTimer);
    volTimer = setTimeout(async () => {
      try {
        const res = await fetch('/api/volume', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ volume: parseInt(v) })
        });
        if (!res.ok) toast(await errorMsg(res, 'Failed to set volume'), 'err');
      } catch (e) { toast('Network error', 'err'); }
      isDraggingVol = false;
    }, 120);
  }

  async function removeTrack(index) {
    try {
      const res = await fetch('/api/queue/' + index, { method: 'DELETE' });
      if (res.ok) { refresh(); }
      else toast(await errorMsg(res, 'Failed to remove'), 'err');
    } catch (e) { toast('Network error', 'err'); }
  }

  async function ctrl(action) {
    try {
      const res = await fetch('/api/queue/' + action, { method: 'POST' });
      if (!res.ok) {
        toast(await errorMsg(res, 'Failed: ' + action), 'err');
        return;
      }
      setTimeout(refresh, 400);
    } catch (e) { toast('Network error', 'err'); }
  }

  let toastTimer = null;
  function toast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show ' + (type || '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = 'toast'; }, 2500);
  }

  function esc(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // init
  refresh();
  loadLocalFiles();
  refreshTimer = setInterval(refresh, 3000);
</script>
</body>
</html>
